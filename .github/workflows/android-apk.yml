# بناء APK على GitHub — تشغيل يدوي: Actions → "Build Android APK" → Run workflow
# جذر المستودع يجب أن يحتوي buildozer.spec

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> "$GITHUB_PATH"

      # يوفّر build-tools (بداخلها aidl) و platform و NDK — يحل خطأ "Aidl not found"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.2
            ndk;25.2.9519653
          log-accepted-android-sdk-licenses: true

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.12" buildozer

      - name: Build debug APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          # Buildozer / p4a يستخدمان SDK النظام عند ضبطهما (بدلاً من مجلد ناقص بدون aidl)
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermonitor-debug-apk
          path: bin/*.apk
