# بناء APK على GitHub — تشغيل يدوي: Actions → "Build Android APK" → Run workflow
# جذر المستودع يجب أن يحتوي buildozer.spec

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Set JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> "$GITHUB_PATH"

      # build-tools (فيها aidl). الحزم في سطر واحد مفصول بمسافات — صيغة multiline في YAML تُمرَّر كاسم حزمة واحد فيُفشل sdkmanager.
      # NDK يحمّله Buildozer حسب buildozer.spec؛ لا نثبّته هنا لتفادي "package not found" لرقم NDK.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools platforms;android-33 build-tools;33.0.2
          log-accepted-android-sdk-licenses: true

      - name: Install Buildozer and Cython
        run: |
          python -m pip install --upgrade pip
          pip install "cython<3.12" buildozer

      # Buildozer يستخدم ~/.buildozer/.../android-sdk وليس ANDROID_SDK_ROOT فقط؛ قد يُنشئ نسخة بلا build-tools فيفشل aidl. نربط المسار ونقبل التراخيص ونثبت build-tools.
      - name: Licenses + build-tools + ربط SDK لمسار Buildozer
        run: |
          set -eux
          test -n "${ANDROID_SDK_ROOT:-}"
          SM="$(find "${ANDROID_SDK_ROOT}/cmdline-tools" -name sdkmanager -type f 2>/dev/null | head -1)"
          test -n "$SM" && test -x "$SM"
          yes | "$SM" --licenses || true
          "$SM" "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true
          "$SM" "build-tools;37.0.0" || "$SM" "build-tools;34.0.0" || true
          mkdir -p "${HOME}/.buildozer/android/platform"
          rm -rf "${HOME}/.buildozer/android/platform/android-sdk"
          ln -s "${ANDROID_SDK_ROOT}" "${HOME}/.buildozer/android/platform/android-sdk"
          # p4a/Buildozer ما زال يتوقع tools/bin/sdkmanager (SDK القديم) بينما cmdline-tools هو المسار الحالي
          mkdir -p "${ANDROID_SDK_ROOT}/tools/bin"
          ln -sf "$SM" "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager"
          test -x "${ANDROID_SDK_ROOT}/tools/bin/sdkmanager"
          test -n "$(find "${ANDROID_SDK_ROOT}/build-tools" -name aidl -type f 2>/dev/null | head -1)"

      - name: Build debug APK
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: watermonitor-debug-apk
          path: bin/*.apk
